services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_service
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
    restart: always
    environment:
      - QDRANT__SERVICE__ENABLE_STATIC_CONTENT=1 # Abilita la Dashboard Web